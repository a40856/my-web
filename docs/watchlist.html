<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>自選股即時追蹤 Watchlist</title>
  <style>
    body{margin:0;font-family:'Segoe UI',Roboto,'Noto Sans',sans-serif;background:#181c24;color:#e5ecff;min-height:100vh;}
    .container{max-width:1100px;margin:40px auto;padding:24px 18px;background:#23293a;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,0.25);}
    h1{font-size:1.7rem;font-weight:600;margin:0 0 18px;}
    .watchlist-form{display:flex;gap:12px;margin-bottom:24px;}
    .watchlist-form input{padding:10px 14px;border-radius:8px;border:1px solid #3a4256;background:#181c24;color:#e5ecff;font-size:1rem;}
    .watchlist-form button{padding:10px 18px;border-radius:8px;border:none;background:#4f9bff;color:#fff;font-weight:600;cursor:pointer;transition:background 0.15s;}
    .watchlist-form button:hover{background:#1f7bff;}
    table{width:100%;border-collapse:collapse;margin-top:12px;}
    th,td{padding:12px 16px;text-align:left;font-size:0.98rem;border-bottom:1px solid #2a3142;}
    th{font-weight:600;color:#f1f6ff;background:#23293a;}
    tr{background:#23293a;}
    tr:nth-child(even){background:#202534;}
    .positive{color:#8ff5bd;}
    .negative{color:#ff94a7;}
    .muted{color:#8fa1c9;}
  </style>
</head>
<body>
  <div class="container">
    <h1>自選股即時追蹤 Watchlist</h1>
    <form class="watchlist-form" id="watchlist-form">
      <input type="text" id="ticker-input" placeholder="輸入股票代號 (如: AAPL)" required />
      <button type="submit">新增到清單</button>
      <button type="button" id="export-config">匯出設定</button>
    </form>
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
      <input id="watchlist-search" placeholder="搜尋 ticker 或名稱" style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid #344; background:#0e1622;color:#fff;" />
      <select id="page-size" style="padding:8px;border-radius:8px;background:#0e1622;color:#fff;border:1px solid #344;">
        <option value="10">10 / page</option>
        <option value="25" selected>25 / page</option>
        <option value="50">50 / page</option>
      </select>
    </div>
    <table id="watchlist-table">
      <thead>
        <tr>
          <th>Ticker</th>
          <th>Name</th>
          <th>Price</th>
          <th>Change ($)</th>
          <th>% Change</th>
          <th>Market Cap</th>
          <th>1M</th>
          <th>3M</th>
          <th>6M</th>
          <th>12M</th>
          <th>Trend</th>
        </tr>
      </thead>
      <tbody id="watchlist-tbody">
        <tr>
          <td>AAPL</td>
          <td>Apple Inc</td>
          <td>170.12</td>
          <td class="positive">+1.23%</td>
          <td>2.8T</td>
          <td>+1.23%</td>
        </tr>
      </tbody>
    </table>
  </div>
  <script>
  const STORAGE_KEY = 'my_watchlist_tickers';
  const tableBody = document.getElementById('watchlist-tbody');
  const form = document.getElementById('watchlist-form');
  const input = document.getElementById('ticker-input');
  const exportBtn = document.getElementById('export-config');

    function getStoredTickers() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }
    function setStoredTickers(arr) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }

    // The front-end will read the server-generated JSON at data/watchlist.json
    async function fetchServerWatchlist() {
      try {
        const res = await fetch('data/watchlist.json', {cache: 'no-store'});
        if (!res.ok) throw new Error('no server data');
        return await res.json();
      } catch (err) {
        return null;
      }
    }

    // Pagination / search state
    let currentPage = 1;
    let pageSize = parseInt(document.getElementById('page-size').value, 10) || 25;
    let lastRows = [];

    function sparklineSVG(values, w = 120, h = 28){
      if(!values || values.length === 0) return '';
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const step = w / (values.length - 1);
      const points = values.map((v,i) => `${(i*step).toFixed(2)},${(h - ((v - min)/range*h)).toFixed(2)}`).join(' ');
      const last = values[values.length-1];
      const color = last >= values[0] ? '#4fe583' : '#ff6b81';
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polyline fill="none" stroke="${color}" stroke-width="1.6" points="${points}"/></svg>`;
    }

    function renderTable(rows) {
      // apply search
      const q = document.getElementById('watchlist-search').value.trim().toUpperCase();
      const filtered = rows.filter(r => {
        if(!q) return true;
        return (r.symbol || '').toString().toUpperCase().includes(q) || (r.shortName || '').toString().toUpperCase().includes(q);
      });
      lastRows = filtered;
      // pagination
      pageSize = parseInt(document.getElementById('page-size').value, 10) || 25;
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      if(currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const pageRows = filtered.slice(start, start + pageSize);

      tableBody.innerHTML = '';
      pageRows.forEach(row => {
        const tr = document.createElement('tr');
  const changeClass = (row.regularMarketChangePercent > 0) ? 'positive' : ((row.regularMarketChangePercent < 0) ? 'negative' : 'muted');
  const price = row.regularMarketPrice !== null && row.regularMarketPrice !== undefined ? Number(row.regularMarketPrice).toFixed(1) : '-';
  const priceChangeVal = row.priceChange !== null && row.priceChange !== undefined ? row.priceChange : null;
  const priceChangeText = priceChangeVal !== null ? (priceChangeVal > 0 ? '+' : '') + priceChangeVal.toFixed(1) : '-';
  const changeText = row.regularMarketChangePercent !== null && row.regularMarketChangePercent !== undefined ? (row.regularMarketChangePercent > 0 ? '+' : '') + row.regularMarketChangePercent.toFixed(2) + '%' : '-';
  const mc = row.marketCap ? formatMarketCap(row.marketCap) : '-';
  const oneM = row.oneMonthChange !== undefined && row.oneMonthChange !== null ? (row.oneMonthChange > 0 ? '+' : '') + (row.oneMonthChange * 100).toFixed(2) + '%' : '-';
  const threeM = row.threeMonthChange !== undefined && row.threeMonthChange !== null ? (row.threeMonthChange > 0 ? '+' : '') + (row.threeMonthChange * 100).toFixed(2) + '%' : '-';
  const sixM = row.sixMonthChange !== undefined && row.sixMonthChange !== null ? (row.sixMonthChange > 0 ? '+' : '') + (row.sixMonthChange * 100).toFixed(2) + '%' : '-';
  const twelveM = row.twelveMonthChange !== undefined && row.twelveMonthChange !== null ? (row.twelveMonthChange > 0 ? '+' : '') + (row.twelveMonthChange * 100).toFixed(2) + '%' : '-';
        // sparkline cell
        let spark = '';
        if(Array.isArray(row.history) && row.history.length > 1){
          spark = sparklineSVG(row.history, 140, 28);
        } else if(row.oneMonthChange !== undefined && row.oneMonthChange !== null){
          // mini bar proportional to 1M change
          const width = Math.min(120, Math.abs(row.oneMonthChange) * 600);
          const color = row.oneMonthChange >= 0 ? '#4fe583' : '#ff6b81';
          spark = `<div style="width:120px;height:24px;background:#0b1220;border-radius:4px;padding:3px;box-sizing:border-box;"><div style="width:${width}px;height:100%;background:${color};border-radius:3px;"></div></div>`;
        } else {
          spark = '-';
        }

        tr.innerHTML = `
          <td style="white-space:nowrap">${row.symbol}</td>
          <td>${row.shortName || '-'}</td>
          <td>${price}</td>
          <td>${priceChangeText}</td>
          <td class="${changeClass}">${changeText}</td>
          <td>${mc}</td>
          <td>${oneM}</td>
          <td>${threeM}</td>
          <td>${sixM}</td>
          <td>${twelveM}</td>
          <td style="width:150px">${spark}</td>
        `;
        tableBody.appendChild(tr);
      });

      renderPaginationControls(filtered.length, totalPages);
    }

    function renderPaginationControls(totalItems, totalPages){
      const existing = document.getElementById('pagination-controls');
      if(existing) existing.remove();
      const wrapper = document.createElement('div');
      wrapper.id = 'pagination-controls';
      wrapper.style.display = 'flex';
      wrapper.style.justifyContent = 'space-between';
      wrapper.style.alignItems = 'center';
      wrapper.style.marginTop = '12px';

      // summary
      const shown = Math.min(pageSize, Math.max(0, totalItems - (currentPage-1)*pageSize));
      const left = document.createElement('div');
      left.style.color = '#9fb0d9';
      left.textContent = `顯示 ${shown} / ${totalItems} 筆`;

      // numbered pagination (show window of pages)
      const right = document.createElement('div');
      right.style.display = 'flex'; right.style.gap = '6px'; right.style.alignItems = 'center';

      const makeBtn = (text, disabled, cls) => {
        const b = document.createElement('button');
        b.textContent = text;
        b.disabled = !!disabled;
        b.style.padding = '6px 10px'; b.style.borderRadius = '6px'; b.style.background = disabled ? '#2a2f38' : '#0e1622'; b.style.color = '#fff'; b.style.border = '1px solid #344';
        if(cls) b.className = cls;
        return b;
      };

      // prev
      const prev = makeBtn('Prev', currentPage === 1);
      prev.addEventListener('click', ()=>{ if(currentPage>1){ currentPage--; renderTable(lastRows); } });
      right.appendChild(prev);

      // page window
      const maxButtons = 7;
      let start = Math.max(1, currentPage - Math.floor(maxButtons/2));
      let end = start + maxButtons - 1;
      if(end > totalPages){ end = totalPages; start = Math.max(1, end - maxButtons + 1); }
      for(let p = start; p <= end; p++){
        const btn = makeBtn(p, false, p===currentPage ? 'active-page' : null);
        if(p===currentPage){ btn.style.background = '#2b6cb0'; }
        btn.addEventListener('click', ()=>{ if(currentPage===p) return; currentPage = p; renderTable(lastRows); });
        right.appendChild(btn);
      }

      // next
      const next = makeBtn('Next', currentPage === totalPages);
      next.addEventListener('click', ()=>{ if(currentPage<totalPages){ currentPage++; renderTable(lastRows); } });
      right.appendChild(next);

      wrapper.appendChild(left);
      wrapper.appendChild(right);
      document.querySelector('.container').appendChild(wrapper);
    }

    function formatMarketCap(val) {
      if (val >= 1e12) return (val/1e12).toFixed(2) + 'T';
      if (val >= 1e9) return (val/1e9).toFixed(2) + 'B';
      if (val >= 1e6) return (val/1e6).toFixed(2) + 'M';
      return val;
    }

    async function updateTable() {
      // Try server-generated data first
      const serverRows = await fetchServerWatchlist();
      const stored = getStoredTickers();
      if ((!serverRows || serverRows.length === 0) && stored.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="11">尚無自選股，請輸入股票代號</td></tr>';
        return;
      }

      const rowsMap = new Map();
      if (Array.isArray(serverRows)) {
        serverRows.forEach(r => rowsMap.set((r.symbol || '').toUpperCase(), r));
      }

      // Merge stored tickers (from localStorage). If a stored ticker not present on server, show placeholder
      const allTickers = new Set([...(serverRows || []).map(r => (r.symbol || '').toUpperCase()), ...stored.map(s => s.toUpperCase())]);
      const finalRows = [];
      allTickers.forEach(sym => {
        if (rowsMap.has(sym)) {
          finalRows.push(rowsMap.get(sym));
        } else {
          finalRows.push({ symbol: sym, shortName: '-', regularMarketPrice: null, regularMarketChangePercent: null, marketCap: null, oneMonthChange: null, notice: '等待伺服器資料（每 12 小時更新）' });
        }
      });

      renderTable(finalRows);
    }

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      const ticker = input.value.trim().toUpperCase();
      if (!ticker) return;
      let tickers = getStoredTickers();
      if (tickers.includes(ticker)) {
        alert('已在自選股清單中');
        input.value = '';
        return;
      }
      tickers.push(ticker);
      setStoredTickers(tickers);
      input.value = '';
      // Inform user that server-side config needs to be updated for permanent server data
      alert('已加入本地清單。若要讓伺服器每 12 小時自動抓取，請匯出設定並將其放入 `scripts/watchlist_config.json`（或直接在 repo 修改）。');
      await updateTable();
    });

    exportBtn.addEventListener('click', function(){
      const tickers = getStoredTickers();
      const blob = new Blob([JSON.stringify(tickers, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'watchlist_config.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    window.addEventListener('DOMContentLoaded', updateTable);
  </script>
</body>
</html>
