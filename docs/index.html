<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My-Web — Generated Stock Table</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#0b1220;
      --panel:#111b2d;
      --panel-border:rgba(255,255,255,0.08);
      --card:#16243b;
      --card-border:rgba(255,255,255,0.1);
      --text:#e5ecff;
      --muted:#8fa1c9;
      --accent:#4f9bff;
      --accent-strong:#1f7bff;
      --table-stripe:rgba(79,155,255,0.08);
    }
  html{scroll-behavior:smooth}
  *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Roboto,'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .site-header{padding:32px 5vw 24px;background:linear-gradient(135deg,#0f1f3d,#09152a)}
    .site-header h1{margin:0;font-size:2rem;font-weight:600}
    .site-header p{margin:8px 0 0;color:var(--muted);max-width:640px}
    .header-actions{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap}
    .link-button{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-weight:500}
    .link-button:hover{background:var(--accent);color:#fff;text-decoration:none}
  main.content{flex:1;width:100%;margin:0;padding:0 32px 56px}
  .layout{width:100%;max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:24px}
  .top-bar{position:sticky;top:16px;z-index:30;background:var(--panel);border:1px solid var(--panel-border);border-radius:18px;padding:20px 24px;box-shadow:0 18px 32px rgba(0,0,0,0.35);display:flex;flex-wrap:wrap;align-items:center;gap:20px}
  .top-bar-links{flex:1 1 320px;display:flex;flex-direction:column;gap:12px;min-width:0}
  .top-bar-links h2{margin:0;color:#f1f6ff;font-size:1.1rem;font-weight:600}
  #sidebar-nav{margin:0}
  #sidebar-nav ul{list-style:none;margin:0;padding:0;display:flex;flex-wrap:wrap;gap:8px}
  #sidebar-nav a{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;color:var(--muted);font-weight:500;background:rgba(255,255,255,0.02);border:1px solid transparent;transition:background 0.15s ease,border-color 0.15s ease,color 0.15s ease}
  #sidebar-nav a:hover{color:#fff;border-color:var(--accent);background:rgba(79,155,255,0.12);text-decoration:none}
  #sidebar-nav a.active{color:#fff;border-color:var(--accent);background:rgba(79,155,255,0.18)}
  .top-bar-search{flex:0 0 260px;display:flex;flex-direction:column;gap:6px;min-width:220px}
  .top-bar-search label{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted)}
  #global-search{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--card-border);background:#0c172b;color:var(--text);font-size:0.95rem}
  #global-search::placeholder{color:rgba(255,255,255,0.45)}
  section.panel{flex:1;background:transparent;border:none;border-radius:0;padding:0;box-shadow:none;display:flex;flex-direction:column;gap:28px;min-width:0}
  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--panel-border);border-radius:18px;padding:20px 24px;box-shadow:0 18px 32px rgba(0,0,0,0.35)}
  button.primary{padding:10px 18px;font-size:0.95rem;border:1px solid var(--accent);color:#fff;background:var(--accent-strong);border-radius:10px;cursor:pointer;font-weight:600;transition:transform 0.15s ease,box-shadow 0.15s ease}
  button.primary:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(31,123,255,0.35)}
    button.primary:disabled{opacity:0.6;cursor:not-allowed}
    #status{color:var(--muted);font-size:0.95rem}
  .meta{margin:4px 0 0;color:var(--muted);font-size:0.95rem}
  #downloads{padding:24px 28px;border-radius:18px;background:var(--panel);border:1px solid var(--panel-border);box-shadow:0 18px 32px rgba(0,0,0,0.35)}
    #downloads h3{margin:0 0 12px;font-size:1.05rem;font-weight:600}
    #download-list p{margin:0;color:var(--muted)}
    #download-list ul{margin:0;padding-left:16px;display:grid;gap:8px}
    #download-list li{list-style:disc}
  #sources{display:grid;gap:28px}
  section.source{background:var(--panel);border:1px solid var(--panel-border);border-radius:18px;padding:24px 26px;scroll-margin-top:120px;box-shadow:0 18px 32px rgba(0,0,0,0.35)}
  section.source h2{margin:0;font-size:1.25rem;font-weight:600}
  section.source p.desc{margin:6px 0 14px;color:var(--muted)}
    section.source .section-status{margin:0 0 12px;font-size:0.9rem;color:var(--muted)}
    section.source .download{margin-bottom:16px}
    section.source .download a{font-weight:500}
  section.source .table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--card-border);background:#0e182b;width:90%;margin:0}
  table{width:100%;border-collapse:collapse;min-width:680px}
    thead{background:rgba(255,255,255,0.04)}
    th,td{padding:12px 16px;text-align:left;font-size:0.95rem;border-bottom:1px solid rgba(255,255,255,0.05)}
  th{font-weight:600;color:#f1f6ff;font-size:0.9rem;text-transform:uppercase;letter-spacing:0.04em;position:relative}
  th.sortable{cursor:pointer;padding-right:28px}
  th.sortable::after{content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-top-color:rgba(255,255,255,0.4)}
  th.sortable.sorted-asc::after{border-top-color:#fff;transform:translateY(-50%) rotate(180deg)}
  th.sortable.sorted-desc::after{border-top-color:#fff}
  th.sortable .th-content{padding-right:18px}
  th.sortable .filter-trigger{margin-right:6px}
  th .th-content{display:flex;align-items:center;gap:10px;justify-content:space-between}
  th .header-label{flex:1;min-width:0}
  .filter-trigger{padding:4px 10px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;border:1px solid rgba(255,255,255,0.18);border-radius:6px;background:rgba(255,255,255,0.04);color:var(--muted);cursor:pointer;transition:background 0.15s ease,color 0.15s ease,border-color 0.15s ease}
  .filter-trigger:hover,.filter-trigger.active{color:#fff;border-color:var(--accent);background:rgba(79,155,255,0.18)}
  th.filtered .header-label{color:var(--accent)}
    tbody tr:nth-child(even){background:var(--table-stripe)}
    tbody tr:hover{background:rgba(79,155,255,0.12)}
  td.cell-number{text-align:right;font-variant-numeric:tabular-nums}
  td.cell-positive{background:rgba(75,167,108,0.16);color:#8ff5bd;font-weight:600}
  td.cell-negative{background:rgba(237,92,120,0.16);color:#ff94a7;font-weight:600}
  td.cell-warning{background:rgba(255,199,110,0.16);color:#ffd88a;font-weight:600}
  td.cell-neutral{color:var(--muted)}
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:18px 0 0;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:0.9rem}
  .pagination .page-info{font-weight:500}
  .pagination .page-controls{display:flex;gap:6px;flex-wrap:wrap}
  .pagination button{padding:8px 12px;background:transparent;border:1px solid var(--card-border);border-radius:6px;color:var(--text);cursor:pointer;min-width:40px}
  .pagination button:hover{border-color:var(--accent);color:var(--accent)}
  .pagination button:disabled{opacity:0.35;cursor:not-allowed}
  .pagination button.current{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .pagination .ellipsis{display:inline-flex;align-items:center;justify-content:center;padding:0 6px;font-size:0.9rem;color:var(--muted)}
  section.source{position:relative}
  .filter-popover{position:fixed;z-index:50;min-width:240px;background:#0f1d33;border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:16px;box-shadow:0 16px 32px rgba(0,0,0,0.45);display:none;max-width:340px;flex-direction:column;gap:12px}
  .filter-popover.open{display:flex}
  .filter-title{font-size:0.78rem;font-weight:600;color:#c5d4ff;text-transform:uppercase;letter-spacing:0.08em}
  .filter-text{display:none}
  .filter-text input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.18);background:#091324;color:#fff}
  .filter-text input::placeholder{color:rgba(255,255,255,0.45)}
  .filter-multi{display:none;max-height:320px;overflow-y:auto;padding-right:4px}
  .filter-multi-actions{display:flex;gap:8px;justify-content:flex-end;margin-bottom:6px}
  .filter-options{display:grid;gap:6px}
  .filter-option{display:flex;align-items:center;gap:8px;padding:2px 0;color:var(--text);font-size:0.85rem}
  .filter-option input{margin:0}
  .filter-option-label{flex:1;min-width:0}
  .filter-option-count{margin-left:auto;color:var(--muted);font-size:0.75rem}
  .filter-empty{margin:0;color:var(--muted);font-size:0.85rem}
  .filter-popover .filter-actions{display:flex;gap:8px;justify-content:flex-end}
  .filter-popover button{padding:6px 12px;font-size:0.85rem;border-radius:6px;border:1px solid var(--card-border);background:transparent;color:var(--muted);cursor:pointer}
  .filter-popover button.apply{background:var(--accent);border-color:var(--accent);color:#fff}
  .filter-popover button:hover{border-color:var(--accent);color:#fff}
    footer.site-footer{margin-top:auto;padding:24px 5vw 32px;color:var(--muted);font-size:0.85rem;text-align:center}
    @media(max-width:1200px){
      .layout{max-width:1040px}
    }
    @media(max-width:992px){
      main.content{padding:0 4vw 48px}
      .top-bar{top:12px}
    }
    @media(max-width:768px){
      .top-bar{position:static;padding:16px 18px;flex-direction:column;align-items:stretch}
      .top-bar-search{flex:1 1 auto;min-width:0;width:100%}
    }
    @media(max-width:900px){table{min-width:600px}}
    @media(max-width:640px){table{min-width:520px}button.primary{width:100%;justify-content:center}}
  </style>
</head>
<body>
  <header class="site-header">
    <h1>期權觀察儀表板</h1>
    <p>追蹤每日熱門期權、觀察名單與最高未平倉量，協助快速掌握市場情緒與可能的交易線索。</p>
    <div class="header-actions">
      <a class="link-button" href="https://github.com/a40856/my-web" target="_blank" rel="noopener">查看 GitHub 原始碼</a>
      <a class="link-button" href="https://github.com/a40856/my-web/tree/data/testing" target="_blank" rel="noopener">資料來源資料夾</a>
    </div>
  </header>

  <main class="content">
    <div class="layout">
      <section class="panel">
        <div class="top-bar">
          <div class="top-bar-links">
            <h2>資料總覽</h2>
            <nav id="sidebar-nav">
              <ul id="nav-links"></ul>
            </nav>
          </div>
          <div class="top-bar-search">
            <label for="global-search">搜尋全表</label>
            <input type="search" id="global-search" placeholder="輸入關鍵字以搜尋所有資料" />
          </div>
        </div>
        <div class="controls">
          <button class="primary" id="refresh">立即重新整理</button>
          <span id="status">載入中…</span>
        </div>
        <p class="meta">資料來源：<strong>data</strong> 分支的 <code>testing</code> 目錄。系統會自動抓取最新檔案並顯示精選欄位，每頁 15 筆。</p>

        <div id="downloads">
          <h3>最新資料檔案</h3>
          <div id="download-list"><p>尚未載入。</p></div>
        </div>

        <div id="sources"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    由 a40856 研究整理。數據僅供參考，請自行評估投資風險。
  </footer>

  <!-- 使用 PapaParse 從 CSV 轉為 JSON -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>
  <script>
    // Repo info — adjust if you rename repo/owner
    const OWNER = 'a40856';
    const REPO = 'my-web';
    const DATA_REF = 'data';

    function extractSymbolRoot(value){
      if(value == null) return '';
      const text = String(value).trim();
      if(!text) return '';
      const match = text.match(/^[A-Za-z^]+/);
      const base = match ? match[0] : text;
      return base.replace(/^\^/, '').toUpperCase();
    }

  const statusEl = document.getElementById('status');
  const downloadsContainer = document.getElementById('downloads');
  const downloadsEl = document.getElementById('download-list');
  const sourcesEl = document.getElementById('sources');
  const navListEl = document.getElementById('nav-links');
  const globalSearchInput = document.getElementById('global-search');
    const PAGE_SIZE = 15;
    let globalSearchTerm = globalSearchInput ? globalSearchInput.value.trim() : '';

    const SOURCES = [
      {
        id: 'history',
        title: '股票觀察名單（History）',
        desc: '股票篩選研究的最新觀察名單。',
        dataUrl: 'data/history.json',
  path: 'testing/history',
  xlsxPattern: /^final_stock_data-.*\.xlsx$/i,
  csvPattern: /^stock_data-.*\.csv$/i,
        displayColumns: [
          { key: 'Ticker', label: 'Ticker' },
          { key: 'Name', label: 'Name' },
          { key: 'Price', label: 'Price', decorate: 'number' },
          { key: '% Change', label: '% Change', decorate: 'percent-change' },
          { key: '20 SMA', label: '20 SMA', decorate: 'percent' },
          { key: '50 SMA', label: '50 SMA', decorate: 'percent' },
          { key: '200 SMA', label: '200 SMA', decorate: 'percent' },
          { key: 'YTD %', label: 'YTD %', decorate: 'percent' },
          { key: '12M Return', label: '12M Return', decorate: 'percent' },
          { key: 'RSI', label: 'RSI', decorate: 'rsi' },
          { key: 'ATR', label: 'ATR', decorate: 'number' },
          { key: 'Market Cap', label: 'Market Cap', decorate: 'number' },
          { key: '52W High', label: '52W High', decorate: 'number' },
          { key: '52W Low', label: '52W Low', decorate: 'number' }
        ],
        sortKey: 'Ticker',
        filters: [
          { key: 'Ticker', type: 'text', label: 'Filter Ticker', placeholder: '輸入股票代號 (例如 NVDA)' }
        ]
      },
      {
        id: 'active',
        title: '熱門期權（Active）',
        desc: '整理最後一個交易日的熱門期權流量。',
        dataUrl: 'data/active.json',
  path: 'testing/active',
  xlsxPattern: /^Mostactive-.*\.xlsx$/i,
        displayColumns: [
          { key: 'Símbolo', label: 'Symbol' },
          { key: 'Nombre', label: 'Name' },
          { key: 'Símbolo subyacente', label: 'Underlying' },
          { key: 'Precio de ejercicio', label: 'Strike', decorate: 'number' },
          { key: 'Expiration Date', label: 'Expiration' },
          { key: 'Precio', label: 'Price', decorate: 'number' },
          { key: 'Volumen', label: 'Volume', decorate: 'number' },
          { key: 'Open Interest', label: 'Open Interest', decorate: 'number' },
          { key: 'Oferta', label: 'Bid', decorate: 'number' },
          { key: 'Demanda', label: 'Ask', decorate: 'number' }
        ],
        sortKey: 'Symbol',
        filters: [
          { key: 'Underlying', type: 'text', label: 'Filter Underlying', placeholder: '輸入標的代號 (例如 NVDA)' },
          { key: 'Symbol', type: 'multi-select', label: 'Symbol Groups', transform: extractSymbolRoot, emptyLabel: '未提供' }
        ]
      },
      {
        id: 'oi',
        title: '最高未平倉量（OI）',
        desc: '追蹤未平倉量最高的期權合約供參考。',
        dataUrl: 'data/oi.json',
  path: 'testing/OI',
  xlsxPattern: /^Sorted-.*\.xlsx$/i,
        displayColumns: [
          { key: 'Symbol', label: 'Symbol' },
          { key: 'Name', label: 'Name' },
          { key: 'Underlying Symbol', label: 'Underlying' },
          { key: 'Strike', label: 'Strike', decorate: 'number' },
          { key: 'Expiration Date', label: 'Expiration' },
          { key: 'Price', label: 'Price', decorate: 'number' },
          { key: 'Volume', label: 'Volume', decorate: 'number' },
          { key: 'Open Interest', label: 'Open Interest', decorate: 'number' },
          { key: 'Bid', label: 'Bid', decorate: 'number' },
          { key: 'Ask', label: 'Ask', decorate: 'number' }
        ],
        sortKey: 'Symbol',
        filters: [
          { key: 'Underlying', type: 'text', label: 'Filter Underlying', placeholder: '輸入標的代號 (例如 NVDA)' },
          { key: 'Symbol', type: 'multi-select', label: 'Symbol Groups', transform: extractSymbolRoot, emptyLabel: '未提供' }
        ]
      }
    ];

  const sections = new Map();
  const dataStates = new Map();
  const navLinks = new Map();
  let sectionObserver = null;

    function renderSidebar(){
      if(!navListEl) return;
      navListEl.innerHTML = '';
      navLinks.clear();
      SOURCES.forEach(source => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `#source-${source.id}`;
        a.textContent = source.title;
        a.addEventListener('click', () => setActiveNav(source.id));
        li.appendChild(a);
        navListEl.appendChild(li);
        navLinks.set(source.id, a);
      });
    }

    function setActiveNav(id){
      navLinks.forEach((el, key) => {
        if(key === id) el.classList.add('active');
        else el.classList.remove('active');
      });
    }

    function applyGlobalSearch(value){
      globalSearchTerm = (value || '').trim();
      dataStates.forEach((state, key) => {
        state.searchTerm = globalSearchTerm;
        state.page = 0;
        const view = sections.get(key);
        if(view){
          updateSectionView(view, state);
        }
      });
    }

    function getSectionObserver(){
      if(sectionObserver !== null) return sectionObserver;
      if(typeof IntersectionObserver === 'undefined') return null;
      sectionObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if(entry.isIntersecting){
            const { source } = entry.target.dataset;
            if(source) setActiveNav(source);
          }
        });
      }, { rootMargin: '-35% 0px -45% 0px' });
      return sectionObserver;
    }

    renderSidebar();
    if(globalSearchInput){
      const handleSearchInput = (event) => applyGlobalSearch(event.target.value);
      globalSearchInput.addEventListener('input', handleSearchInput);
      globalSearchInput.addEventListener('search', handleSearchInput);
    }
    if(SOURCES.length){
      setActiveNav(SOURCES[0].id);
    }

    const repositionPopovers = () => {
      sections.forEach(view => positionFilterPopover(view));
    };

    window.addEventListener('resize', repositionPopovers);
    window.addEventListener('scroll', repositionPopovers, true);

    async function listFiles(path){
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${DATA_REF}`;
      const res = await fetch(url);
      if(!res.ok) return null;
      return res.json();
    }

    function ensureSection(source){
      if(sections.has(source.id)) return sections.get(source.id);
      const section = document.createElement('section');
      section.className = 'source';
      section.dataset.source = source.id;
  section.id = `source-${source.id}`;

      const h2 = document.createElement('h2');
      h2.textContent = source.title;
      section.appendChild(h2);

      if(source.desc){
        const desc = document.createElement('p');
        desc.className = 'desc';
        desc.textContent = source.desc;
        section.appendChild(desc);
      }

      const status = document.createElement('p');
      status.className = 'section-status';
      status.textContent = '尚未載入';
      section.appendChild(status);

      const download = document.createElement('div');
      download.className = 'download';
      section.appendChild(download);

      const tableWrap = document.createElement('div');
      tableWrap.className = 'table-wrap';
      section.appendChild(tableWrap);

      const pagination = document.createElement('div');
      pagination.className = 'pagination';
      section.appendChild(pagination);

      const popover = document.createElement('div');
      popover.className = 'filter-popover';
      const titleEl = document.createElement('div');
      titleEl.className = 'filter-title';
      titleEl.textContent = 'Filter';
      popover.appendChild(titleEl);

      const textWrap = document.createElement('div');
      textWrap.className = 'filter-text';
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = '輸入關鍵字以篩選';
      textWrap.appendChild(input);
  textWrap.style.display = 'none';
      popover.appendChild(textWrap);

      const multiWrap = document.createElement('div');
      multiWrap.className = 'filter-multi';
  multiWrap.style.display = 'none';

      const multiActions = document.createElement('div');
      multiActions.className = 'filter-multi-actions';

      const selectAllBtn = document.createElement('button');
      selectAllBtn.type = 'button';
      selectAllBtn.textContent = 'Select All';
  selectAllBtn.disabled = true;
      multiActions.appendChild(selectAllBtn);

      const selectNoneBtn = document.createElement('button');
      selectNoneBtn.type = 'button';
      selectNoneBtn.textContent = 'Select None';
  selectNoneBtn.disabled = true;
      multiActions.appendChild(selectNoneBtn);

      multiWrap.appendChild(multiActions);

      const optionsEl = document.createElement('div');
      optionsEl.className = 'filter-options';
      multiWrap.appendChild(optionsEl);

      popover.appendChild(multiWrap);

      const actions = document.createElement('div');
      actions.className = 'filter-actions';

      const clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.textContent = 'Clear';
      actions.appendChild(clearBtn);

      const applyBtn = document.createElement('button');
      applyBtn.type = 'button';
      applyBtn.className = 'apply';
      applyBtn.textContent = 'Apply';
      actions.appendChild(applyBtn);

      popover.appendChild(actions);
      section.appendChild(popover);

      sourcesEl.appendChild(section);
      const record = { section, statusEl: status, downloadEl: download, tableEl: tableWrap, paginationEl: pagination };
      record.filterPopover = {
        el: popover,
        label: titleEl,
        textWrap,
        input,
        multiWrap,
        optionsEl,
        selectAllBtn,
        selectNoneBtn,
        applyBtn,
        clearBtn,
        anchorEl: null,
        triggerEl: null,
        activeIndex: null,
        activeType: null,
        open: false,
        onClickAway: null
      };
      record.stateId = source.id;
      const stateKey = source.id;
      input.addEventListener('keydown', evt => {
        if(evt.key === 'Enter'){
          const state = dataStates.get(stateKey);
          const pop = record.filterPopover;
          if(state && pop.activeType === 'text' && pop.activeIndex !== null){
            applyTextFilter(state, record, pop.activeIndex, input.value, true);
          }
          evt.preventDefault();
        } else if(evt.key === 'Escape'){
          closeFilterPopover(record);
          evt.preventDefault();
        }
      });
      input.addEventListener('input', () => {
        const state = dataStates.get(stateKey);
        const pop = record.filterPopover;
        if(state && pop.activeType === 'text' && pop.activeIndex !== null){
          applyTextFilter(state, record, pop.activeIndex, input.value, false);
        }
      });
      clearBtn.addEventListener('click', () => {
        const state = dataStates.get(stateKey);
        const pop = record.filterPopover;
        if(!state || pop.activeIndex === null) return;
        if(pop.activeType === 'text'){
          input.value = '';
        }
        resetFilter(state, record, pop.activeIndex);
        if(pop.activeType === 'text'){
          input.focus();
        }
      });
      applyBtn.addEventListener('click', () => {
        const state = dataStates.get(stateKey);
        const pop = record.filterPopover;
        if(!state) return;
        if(pop.activeType === 'text' && pop.activeIndex !== null){
          applyTextFilter(state, record, pop.activeIndex, input.value, true);
        } else {
          closeFilterPopover(record);
        }
      });

      optionsEl.addEventListener('change', evt => {
        const target = evt.target;
        if(!(target instanceof HTMLInputElement)) return;
        if(target.type !== 'checkbox') return;
        const state = dataStates.get(stateKey);
        const pop = record.filterPopover;
        if(!state || pop.activeIndex === null || pop.activeType !== 'multi-select') return;
        const value = target.dataset.optionValue || '';
        setMultiSelection(state, record, pop.activeIndex, value, target.checked);
        syncMultiOptionChecks(pop, state, pop.activeIndex);
      });

      selectAllBtn.addEventListener('click', () => {
        const state = dataStates.get(stateKey);
        const pop = record.filterPopover;
        if(!state || pop.activeIndex === null || pop.activeType !== 'multi-select') return;
        selectAllOptions(state, record, pop.activeIndex);
        renderMultiSelectOptions(pop, state, pop.activeIndex);
      });

      selectNoneBtn.addEventListener('click', () => {
        const state = dataStates.get(stateKey);
        const pop = record.filterPopover;
        if(!state || pop.activeIndex === null || pop.activeType !== 'multi-select') return;
        deselectAllOptions(state, record, pop.activeIndex);
        renderMultiSelectOptions(pop, state, pop.activeIndex);
      });
      sections.set(source.id, record);

      const observer = getSectionObserver();
      if(observer){
        observer.observe(section);
      }
      return record;
    }

    function renderTable(view, state, rows){
      const container = view.tableEl;
      container.innerHTML = '';
      const headers = state.headers;
      if(!headers || headers.length === 0){
        container.textContent = 'No data available';
        return;
      }
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const tbody = document.createElement('tbody');
  const decorators = Array.isArray(state.decorators) ? state.decorators : [];

      const headerRow = document.createElement('tr');
      headers.forEach((h, idx) => {
        const th = document.createElement('th');
        th.dataset.columnIndex = String(idx);

        const thContent = document.createElement('div');
        thContent.className = 'th-content';

        const labelSpan = document.createElement('span');
        labelSpan.className = 'header-label';
        labelSpan.textContent = h;
        thContent.appendChild(labelSpan);

        const filterState = getFilterState(state, idx);
        if(filterState){
          th.classList.add('filterable');
          if(isFilterActive(filterState)){
            th.classList.add('filtered');
          }
          const filterBtn = document.createElement('button');
          filterBtn.type = 'button';
          filterBtn.className = 'filter-trigger';
          filterBtn.dataset.filterIndex = String(idx);
          filterBtn.title = filterState.label || 'Filter';
          filterBtn.textContent = 'Filter';
          filterBtn.setAttribute('aria-label', filterState.label || 'Filter');
          if(isFilterActive(filterState)){
            filterBtn.classList.add('active');
          }
          filterBtn.addEventListener('click', evt => {
            evt.stopPropagation();
            toggleFilterPopover(view, state, idx, th, filterBtn);
          });
          thContent.appendChild(filterBtn);
        }

        th.appendChild(thContent);

        if(idx === state.sortableIndex){
          th.classList.add('sortable');
          if(state.sortDirection === 'asc') th.classList.add('sorted-asc');
          if(state.sortDirection === 'desc') th.classList.add('sorted-desc');
          th.addEventListener('click', evt => {
            if(evt.target instanceof HTMLElement && evt.target.classList.contains('filter-trigger')) return;
            toggleSymbolSort(state, view);
          });
        }

        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);

      rows.forEach(r => {
        const tr = document.createElement('tr');
        r.forEach((c, idx) => {
          const td = document.createElement('td');
          td.textContent = c;
          const decoratorId = decorators[idx] || null;
          applyCellDecorator(td, c, decoratorId);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      table.appendChild(thead);
      table.appendChild(tbody);
      container.appendChild(table);
    }

    function parseNumeric(value){
      if(typeof value === 'number') return value;
      if(value == null) return NaN;
      const normalized = String(value).replace(/[%,$]/g, '').replace(/,/g, '').trim();
      if(!normalized) return NaN;
      const num = parseFloat(normalized);
      return Number.isNaN(num) ? NaN : num;
    }

    function setTrendClass(td, num){
      if(Number.isNaN(num)) return;
      if(num > 0){
        td.classList.add('cell-positive');
      } else if(num < 0){
        td.classList.add('cell-negative');
      } else {
        td.classList.add('cell-neutral');
      }
    }

    function applyCellDecorator(td, value, decoratorId){
      if(!decoratorId) return;
      const text = value == null ? '' : String(value).trim();
      if(!text){
        td.classList.add('cell-neutral');
      }
      switch(decoratorId){
        case 'number':
          td.classList.add('cell-number');
          break;
        case 'percent':
        case 'percent-change': {
          td.classList.add('cell-number');
          const num = parseNumeric(text);
          if(Number.isNaN(num)){
            td.classList.add('cell-neutral');
            break;
          }
          setTrendClass(td, num);
          break;
        }
        case 'rsi': {
          td.classList.add('cell-number');
          const num = parseNumeric(text);
          if(Number.isNaN(num)){
            td.classList.add('cell-neutral');
            break;
          }
          if(num >= 70){
            td.classList.add('cell-warning');
          } else if(num <= 30){
            td.classList.add('cell-positive');
          } else {
            td.classList.add('cell-neutral');
          }
          break;
        }
        default:
          break;
      }
    }

    function toggleSymbolSort(state, view){
      if(typeof state.sortableIndex !== 'number' || state.sortableIndex < 0) return;
      const nextDirection = state.sortDirection === 'asc' ? 'desc' : state.sortDirection === 'desc' ? null : 'asc';
      state.sortDirection = nextDirection;
      state.page = 0;
      updateSectionView(view, state);
    }

    function positionFilterPopover(view){
      const pop = view.filterPopover;
      if(!pop || !pop.open) return;
      if(pop.anchorEl && !document.contains(pop.anchorEl)){
        let fallback = null;
        if(pop.activeIndex !== null && pop.activeIndex !== undefined){
          fallback = view.tableEl.querySelector(`th[data-column-index="${pop.activeIndex}"]`);
        }
        if(!fallback){
          fallback = view.tableEl.querySelector('th.filterable');
        }
        if(fallback){
          pop.anchorEl = fallback;
        } else {
          closeFilterPopover(view);
          return;
        }
      }
      if(!pop.anchorEl) return;
      let anchorRect = pop.anchorEl.getBoundingClientRect();
      if(anchorRect.width === 0 && anchorRect.height === 0){
        const header = view.tableEl.querySelector(`th[data-column-index="${pop.activeIndex}"]`);
        if(header){
          pop.anchorEl = header;
          anchorRect = header.getBoundingClientRect();
        }
      }
      if(anchorRect.width === 0 && anchorRect.height === 0){
        closeFilterPopover(view);
        return;
      }
      const margin = 12;
      const popRect = pop.el.getBoundingClientRect();
      const width = popRect.width || pop.el.offsetWidth || 240;
      const height = popRect.height || pop.el.offsetHeight || 0;
      let top = anchorRect.bottom + margin;
      if(top + height > window.innerHeight - margin){
        top = Math.max(margin, anchorRect.top - height - margin);
      }
      let left = anchorRect.left;
      if(left + width > window.innerWidth - margin){
        left = window.innerWidth - width - margin;
      }
      if(left < margin){
        left = margin;
      }
      pop.el.style.top = `${top}px`;
      pop.el.style.left = `${left}px`;
    }

    function closeFilterPopover(view){
      const pop = view.filterPopover;
      if(!pop || !pop.open) return;
      pop.open = false;
      pop.el.classList.remove('open');
      pop.anchorEl = null;
      if(pop.triggerEl){
        pop.triggerEl.classList.remove('active');
        pop.triggerEl = null;
      }
      pop.activeIndex = null;
      pop.activeType = null;
      if(pop.onClickAway){
        document.removeEventListener('click', pop.onClickAway, true);
        pop.onClickAway = null;
      }
    }

    function getFilterState(state, index){
      if(!state || !state.filters) return null;
      return state.filters.get(index) || null;
    }

    function isFilterActive(filterState){
      if(!filterState) return false;
      if(filterState.type === 'text'){
        return Boolean(filterState.term && filterState.term.trim());
      }
      if(filterState.type === 'multi-select'){
        return Boolean(filterState.excluded && filterState.excluded.size);
      }
      return false;
    }

    function applyTextFilter(state, view, index, value, closeAfter){
      const filterState = getFilterState(state, index);
      if(!filterState || filterState.type !== 'text') return;
      filterState.term = (value || '').trim();
      state.page = 0;
      updateSectionView(view, state);
      if(closeAfter) closeFilterPopover(view);
    }

    function resetFilter(state, view, index){
      const filterState = getFilterState(state, index);
      if(!filterState) return;
      if(filterState.type === 'text'){
        filterState.term = '';
        if(view.filterPopover){
          view.filterPopover.input.value = '';
        }
      } else if(filterState.type === 'multi-select'){
        filterState.excluded.clear();
      }
      state.page = 0;
      updateSectionView(view, state);
      if(filterState.type === 'multi-select' && view.filterPopover){
        syncMultiOptionChecks(view.filterPopover, state, index);
      }
    }

    function setMultiSelection(state, view, index, optionValue, isChecked){
      const filterState = getFilterState(state, index);
      if(!filterState || filterState.type !== 'multi-select') return;
      if(isChecked){
        filterState.excluded.delete(optionValue);
      } else {
        filterState.excluded.add(optionValue);
      }
      state.page = 0;
      updateSectionView(view, state);
    }

    function selectAllOptions(state, view, index){
      const filterState = getFilterState(state, index);
      if(!filterState || filterState.type !== 'multi-select') return;
      filterState.excluded.clear();
      state.page = 0;
      updateSectionView(view, state);
      if(view.filterPopover){
        syncMultiOptionChecks(view.filterPopover, state, index);
      }
    }

    function deselectAllOptions(state, view, index){
      const filterState = getFilterState(state, index);
      if(!filterState || filterState.type !== 'multi-select') return;
      filterState.excluded.clear();
      (filterState.options || []).forEach(opt => {
        filterState.excluded.add(opt.value);
      });
      state.page = 0;
      updateSectionView(view, state);
      if(view.filterPopover){
        syncMultiOptionChecks(view.filterPopover, state, index);
      }
    }

    function renderMultiSelectOptions(pop, state, index){
      const filterState = getFilterState(state, index);
      if(!filterState || filterState.type !== 'multi-select') return;
      const container = pop.optionsEl;
      container.innerHTML = '';
      const options = filterState.options || [];
      if(!options.length){
        const empty = document.createElement('p');
        empty.className = 'filter-empty';
        empty.textContent = '沒有可用選項';
        container.appendChild(empty);
        pop.selectAllBtn.disabled = true;
        pop.selectNoneBtn.disabled = true;
        return;
      }
      pop.selectAllBtn.disabled = false;
      pop.selectNoneBtn.disabled = false;
      options.forEach(opt => {
        const optionLabel = document.createElement('label');
        optionLabel.className = 'filter-option';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.dataset.optionValue = opt.value;
        checkbox.checked = !filterState.excluded.has(opt.value);
        optionLabel.appendChild(checkbox);
        const text = document.createElement('span');
        text.className = 'filter-option-label';
        text.textContent = opt.label || opt.value || filterState.emptyLabel || '未提供';
        optionLabel.appendChild(text);
        if(typeof opt.count === 'number'){
          const count = document.createElement('span');
          count.className = 'filter-option-count';
          count.textContent = opt.count;
          optionLabel.appendChild(count);
        }
        container.appendChild(optionLabel);
      });
    }

    function syncMultiOptionChecks(pop, state, index){
      const filterState = getFilterState(state, index);
      if(!filterState || filterState.type !== 'multi-select') return;
      const boxes = pop.optionsEl.querySelectorAll('input[type="checkbox"]');
      boxes.forEach(box => {
        const value = box.dataset.optionValue || '';
        box.checked = !filterState.excluded.has(value);
      });
    }

    function toggleFilterPopover(view, state, columnIndex, headerEl, triggerEl){
      const pop = view.filterPopover;
      if(!pop) return;
      const filterState = getFilterState(state, columnIndex);
      if(!filterState) return;
      if(pop.open && pop.activeIndex === columnIndex){
        closeFilterPopover(view);
        return;
      }
      if(pop.open){
        closeFilterPopover(view);
      }
      pop.open = true;
      pop.anchorEl = headerEl;
      pop.triggerEl = triggerEl || headerEl;
      pop.activeIndex = columnIndex;
      pop.activeType = filterState.type;
      pop.el.classList.add('open');
      if(pop.triggerEl){
        pop.triggerEl.classList.add('active');
      }
      pop.label.textContent = filterState.label || 'Filter';
      if(filterState.type === 'text'){
        pop.textWrap.style.display = 'block';
        pop.multiWrap.style.display = 'none';
        pop.input.placeholder = filterState.placeholder || '輸入關鍵字以篩選';
        pop.input.value = filterState.term || '';
        pop.clearBtn.textContent = 'Clear';
        pop.applyBtn.textContent = 'Apply';
        setTimeout(() => pop.input.focus({ preventScroll: true }), 0);
      } else if(filterState.type === 'multi-select'){
        pop.textWrap.style.display = 'none';
        pop.multiWrap.style.display = 'block';
        pop.clearBtn.textContent = 'Reset';
        pop.applyBtn.textContent = 'Done';
        renderMultiSelectOptions(pop, state, columnIndex);
      } else {
        pop.textWrap.style.display = 'none';
        pop.multiWrap.style.display = 'none';
      }
      positionFilterPopover(view);

      if(pop.onClickAway){
        document.removeEventListener('click', pop.onClickAway, true);
      }
      pop.onClickAway = (event) => {
        if(!pop.el.contains(event.target) && event.target !== triggerEl && event.target !== headerEl){
          closeFilterPopover(view);
        }
      };
      document.addEventListener('click', pop.onClickAway, true);
    }

    function pickLatest(files, pattern){
      if(!files) return null;
      const matches = files.filter(it => it.type === 'file' && pattern.test(it.name));
      if(matches.length === 0) return null;
      matches.sort((a,b) => a.name.localeCompare(b.name));
      return matches[matches.length - 1];
    }

    function cleanRows(rows){
      if(!Array.isArray(rows)) return [];
      return rows
        .map(row => Array.isArray(row) ? row.map(cell => cell == null ? '' : cell) : [])
        .filter(row => row.length && row.some(cell => `${cell}`.trim() !== ''));
    }

    function normalizeKey(value){
      return String(value ?? '').trim().toLowerCase();
    }

    function buildDisplay(rows, source){
      if(!rows || rows.length === 0) return { headers: [], rows: [], indices: [] };
      const headers = rows[0];
      const wanted = Array.isArray(source.displayColumns) ? source.displayColumns : [];
      const indices = [];
      const labels = [];
      const configs = [];
      const decorators = [];
      if(wanted.length){
        const lowered = headers.map(h => normalizeKey(h));
        wanted.forEach(col => {
          const entry = typeof col === 'string' ? { key: col } : (col || {});
          const idx = lowered.indexOf(normalizeKey(entry.key ?? entry.label ?? ''));
          if(idx >= 0){
            indices.push(idx);
            labels.push(entry.label || headers[idx] || '');
            configs.push(entry);
            decorators.push(entry.decorate || null);
          }
        });
      }
      if(!indices.length){
        for(let i=0;i<headers.length;i++){
          indices.push(i);
          configs.push(null);
          decorators.push(null);
        }
      }
      const displayHeaders = labels.length === indices.length && labels.length
        ? labels
        : indices.map(i => headers[i] ?? '');
      const dataRows = [];
      for(let i=1;i<rows.length;i++){
        const srcRow = rows[i] || [];
        dataRows.push(indices.map(idx => srcRow[idx] ?? ''));
      }
      const columnMeta = indices.map((idx, i) => ({
        header: headers[idx] ?? '',
        label: displayHeaders[i] ?? '',
        config: configs[i] || null,
        decorator: decorators[i] || null
      }));
      const normalizeTarget = (value) => {
        if(!value) return '';
        return normalizeKey(value);
      };
      const matchColumn = (target, meta) => {
        if(!target) return false;
        if(normalizeKey(meta.label) === target) return true;
        if(normalizeKey(meta.header) === target) return true;
        if(meta.config){
          if(meta.config.label && normalizeKey(meta.config.label) === target) return true;
          if(meta.config.key && normalizeKey(meta.config.key) === target) return true;
        }
        return false;
      };
      const findTargetIndex = (targetValue) => {
        const target = normalizeTarget(targetValue);
        if(!target) return -1;
        for(let i=0;i<columnMeta.length;i++){
          if(matchColumn(target, columnMeta[i])) return i;
        }
        return -1;
      };
      let sortableIndex = findTargetIndex(source.sortKey);
      if(sortableIndex < 0){
        sortableIndex = columnMeta.findIndex(meta => normalizeKey(meta.label).includes('symbol'));
      }

      const filterConfigs = new Map();
      const filterSpecs = Array.isArray(source.filters) ? source.filters.slice() : [];
      if(!filterSpecs.length && (source.filterKey || source.filterLabel || source.filterPlaceholder)){
        filterSpecs.push({
          key: source.filterKey,
          label: source.filterLabel,
          placeholder: source.filterPlaceholder,
          type: 'text'
        });
      }
      filterSpecs.forEach(spec => {
        if(!spec) return;
        const specKey = spec.key || spec.label;
        const idx = findTargetIndex(specKey);
        if(idx < 0) return;
        const config = {
          type: spec.type === 'multi-select' ? 'multi-select' : 'text',
          label: spec.label || 'Filter',
          placeholder: spec.placeholder || '輸入關鍵字以篩選',
          key: specKey || '',
          transform: typeof spec.transform === 'function' ? spec.transform : null,
          emptyLabel: spec.emptyLabel || ''
        };
        filterConfigs.set(idx, config);
      });
      return {
        headers: displayHeaders,
        rows: dataRows,
        indices,
        sortableIndex,
        decorators: columnMeta.map(meta => meta.decorator || null),
        filterConfigs
      };
    }

    function createFilters(display){
      const filters = new Map();
      if(!display || !(display.filterConfigs instanceof Map) || display.filterConfigs.size === 0) return filters;
      display.filterConfigs.forEach((config, index) => {
        if(!config) return;
        const filterState = {
          type: config.type === 'multi-select' ? 'multi-select' : 'text',
          label: config.label || 'Filter',
          placeholder: config.placeholder || '輸入關鍵字以篩選',
          key: config.key || '',
          transform: typeof config.transform === 'function' ? config.transform : null,
          emptyLabel: config.emptyLabel || ''
        };
        if(filterState.type === 'multi-select'){
          const transform = filterState.transform || ((value) => value);
          const counts = new Map();
          (display.rows || []).forEach(row => {
            const raw = row[index];
            const derived = transform(raw, row);
            const normalized = derived == null ? '' : String(derived).trim();
            const label = normalized || filterState.emptyLabel || '未提供';
            if(counts.has(normalized)){
              counts.get(normalized).count += 1;
            } else {
              counts.set(normalized, { value: normalized, label, count: 1 });
            }
          });
          filterState.options = Array.from(counts.values()).sort((a, b) => a.label.localeCompare(b.label, undefined, { sensitivity: 'base' }));
          filterState.excluded = new Set();
        } else {
          filterState.term = '';
        }
        filters.set(index, filterState);
      });
      return filters;
    }

    function computeRows(state){
      let rows = state.rows;
      if(state.searchTerm){
        const term = normalizeKey(state.searchTerm);
        if(term){
          rows = rows.filter(row => row.some(cell => normalizeKey(cell).includes(term)));
        }
      }
      if(state.filters && state.filters.size){
        state.filters.forEach((filterState, index) => {
          if(!filterState) return;
          if(filterState.type === 'text'){
            const term = normalizeKey(filterState.term);
            if(term){
              rows = rows.filter(row => normalizeKey(row[index]).includes(term));
            }
          } else if(filterState.type === 'multi-select'){
            if(filterState.excluded && filterState.excluded.size){
              const transform = typeof filterState.transform === 'function'
                ? filterState.transform
                : (value) => value;
              rows = rows.filter(row => {
                const raw = row[index];
                const derived = transform(raw, row);
                const normalized = derived == null ? '' : String(derived).trim();
                return !filterState.excluded.has(normalized);
              });
            }
          }
        });
      } else if(state.filterTerm && typeof state.filterIndex === 'number' && state.filterIndex >= 0){
        const term = normalizeKey(state.filterTerm);
        rows = rows.filter(row => normalizeKey(row[state.filterIndex]).includes(term));
      }
      if(state.sortDirection && typeof state.sortableIndex === 'number' && state.sortableIndex >= 0){
        const sorted = [...rows].sort((a, b) => {
          const av = normalizeKey(a[state.sortableIndex]);
          const bv = normalizeKey(b[state.sortableIndex]);
          if(av < bv) return -1;
          if(av > bv) return 1;
          return 0;
        });
        if(state.sortDirection === 'desc') sorted.reverse();
        rows = sorted;
      }
      return rows;
    }

    function buildPageRange(totalPages, current){
      const pages = new Set([0, totalPages - 1, current]);
      for(let offset=1; offset<=2; offset++){
        pages.add(current - offset);
        pages.add(current + offset);
      }
      const arr = Array.from(pages).filter(p => p >= 0 && p < totalPages).sort((a,b) => a - b);
      while(arr.length > 7){
        let removeIndex = -1;
        let maxDist = -1;
        for(let i=0;i<arr.length;i++){
          const p = arr[i];
          if(p === 0 || p === totalPages - 1) continue;
          const dist = Math.abs(p - current);
          if(dist > maxDist){
            maxDist = dist;
            removeIndex = i;
          }
        }
        if(removeIndex === -1) break;
        arr.splice(removeIndex, 1);
      }
      return arr;
    }

    function renderPagination(view, state){
      const sourceRows = state.currentRows || computeRows(state);
      const totalRows = sourceRows.length;
      const totalPages = totalRows === 0 ? 1 : Math.ceil(totalRows / state.pageSize);
      if(state.page >= totalPages) state.page = Math.max(0, totalPages - 1);

      const start = totalRows === 0 ? 0 : state.page * state.pageSize + 1;
      const end = totalRows === 0 ? 0 : Math.min(totalRows, start + state.pageSize - 1);

      const pagination = view.paginationEl;
      pagination.innerHTML = '';

      const info = document.createElement('span');
      info.className = 'page-info';
      info.textContent = totalRows === 0
        ? '目前無資料'
        : `顯示第 ${start}–${end} 筆，共 ${totalRows} 筆`;
      pagination.appendChild(info);

      const controls = document.createElement('div');
      controls.className = 'page-controls';
      pagination.appendChild(controls);

  const disableNav = totalRows === 0 || totalPages === 1;

      const createButton = (label, targetPage, disabled, extraClass='') => {
        const btn = document.createElement('button');
        btn.textContent = label;
        if(extraClass) btn.classList.add(extraClass);
        btn.disabled = disabled;
        if(!disabled){
          btn.addEventListener('click', () => {
            state.page = targetPage;
            updateSectionView(view, state);
          });
        }
        controls.appendChild(btn);
      };

      createButton('<<', 0, disableNav || state.page === 0);
      createButton('<', Math.max(0, state.page - 1), disableNav || state.page === 0);

  const pageNumbers = buildPageRange(totalPages, state.page);
      pageNumbers.forEach((page, idx) => {
        if(idx > 0 && page - pageNumbers[idx - 1] > 1){
          const ellipsis = document.createElement('span');
          ellipsis.className = 'ellipsis';
          ellipsis.textContent = '...';
          controls.appendChild(ellipsis);
        }
        createButton(String(page + 1), page, disableNav, page === state.page ? 'current' : '');
      });

      createButton('>', Math.min(totalPages - 1, state.page + 1), disableNav || state.page >= totalPages - 1);
      createButton('>>', totalPages - 1, disableNav || state.page >= totalPages - 1);
    }

    function updateSectionView(view, state){
      const effectiveRows = computeRows(state);
      state.currentRows = effectiveRows;
      const start = state.page * state.pageSize;
      const pageRows = effectiveRows.slice(start, start + state.pageSize);
      renderTable(view, state, pageRows);
      renderPagination(view, state);
      if(view.filterPopover && view.filterPopover.open){
        const pop = view.filterPopover;
        let header = null;
        if(pop.activeIndex !== null && pop.activeIndex !== undefined){
          header = view.tableEl.querySelector(`th[data-column-index="${pop.activeIndex}"]`);
        }
        if(!header){
          header = view.tableEl.querySelector('th.filterable');
        }
        if(header){
          pop.anchorEl = header;
          const trigger = header.querySelector('.filter-trigger');
          if(trigger){
            pop.triggerEl = trigger;
            trigger.classList.add('active');
          }
          positionFilterPopover(view);
        }
      }
    }

    async function loadStaticData(source){
      if(!source.dataUrl) return null;
      try {
        const res = await fetch(source.dataUrl, { cache: 'no-store' });
        if(!res.ok) return null;
        const data = await res.json();
        if(!Array.isArray(data.rows)) data.rows = [];
        return data;
      } catch (err) {
        console.error(err);
        return null;
      }
    }

    async function fetchXlsxRows(url){
      const res = await fetch(url);
      if(!res.ok) throw new Error('下載 XLSX 失敗');
      const buffer = await res.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: 'array' });
      const sheetName = workbook.SheetNames[0];
      if(!sheetName) return [];
      const sheet = workbook.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      return cleanRows(rows);
    }

    async function fetchCsvRows(url){
      const res = await fetch(url);
      if(!res.ok) throw new Error('下載 CSV 失敗');
      const text = await res.text();
      const parsed = Papa.parse(text.trim());
      return cleanRows(parsed.data);
    }

    async function loadSource(source){
      const view = ensureSection(source);
      view.statusEl.textContent = '載入資料中…';
      view.downloadEl.innerHTML = '';
      view.tableEl.innerHTML = '';

      const staticData = await loadStaticData(source);
      if(staticData){
        const name = staticData.sourceFile || staticData.name || '最新資料';
        const downloadUrl = staticData.download || null;
        const rows = cleanRows(staticData.rows);
        const display = buildDisplay(rows, source);
        const state = {
          headers: display.headers,
          rows: display.rows,
          page: 0,
          pageSize: PAGE_SIZE,
          sortableIndex: display.sortableIndex,
          sortDirection: null,
          searchTerm: globalSearchTerm,
          currentRows: null,
          decorators: display.decorators,
          filters: createFilters(display)
        };
        dataStates.set(source.id, state);
        if(view.filterPopover){
          view.filterPopover.input.value = '';
          view.filterPopover.textWrap.style.display = 'none';
          view.filterPopover.multiWrap.style.display = 'none';
        }

        updateSectionView(view, state);
        if(display.headers.length && display.rows.length){
          view.statusEl.textContent = `最新檔案：${name}`;
        } else {
          view.statusEl.textContent = `最新檔案：${name}（無資料列）`;
        }

        if(downloadUrl){
          view.downloadEl.innerHTML = `<a href="${downloadUrl}" target="_blank" rel="noopener">下載 ${name}</a>`;
        }
        return downloadUrl ? { id: source.id, name, url: downloadUrl } : null;
      }
      if(!source.path){
        view.statusEl.textContent = '找不到對應資料來源。';
        return null;
      }

      const files = await listFiles(source.path);
      if(!files){
        view.statusEl.textContent = '找不到對應資料夾或無法存取。';
        return null;
      }

      let picked = null;
      let format = null;
      if(source.xlsxPattern){
        const latestXlsx = pickLatest(files, source.xlsxPattern);
        if(latestXlsx){
          picked = latestXlsx;
          format = 'xlsx';
        }
      }
      if(!picked && source.csvPattern){
        const latestCsv = pickLatest(files, source.csvPattern);
        if(latestCsv){
          picked = latestCsv;
          format = 'csv';
        }
      }

      if(!picked){
        view.statusEl.textContent = '未找到符合命名規則的檔案。';
        return null;
      }

      try {
        const rows = format === 'xlsx' ? await fetchXlsxRows(picked.download_url) : await fetchCsvRows(picked.download_url);
        const cleaned = cleanRows(rows);
        const display = buildDisplay(cleaned, source);
        const state = {
          headers: display.headers,
          rows: display.rows,
          page: 0,
          pageSize: PAGE_SIZE,
          sortableIndex: display.sortableIndex,
          sortDirection: null,
          searchTerm: globalSearchTerm,
          currentRows: null,
          decorators: display.decorators,
          filters: createFilters(display)
        };
        dataStates.set(source.id, state);
        if(view.filterPopover){
          view.filterPopover.input.value = '';
          view.filterPopover.textWrap.style.display = 'none';
          view.filterPopover.multiWrap.style.display = 'none';
        }
        updateSectionView(view, state);
        if(display.headers.length && display.rows.length){
          view.statusEl.textContent = `最新檔案：${picked.name}`;
        } else {
          view.statusEl.textContent = `最新檔案：${picked.name}（無資料列）`;
        }
        view.downloadEl.innerHTML = `<a href="${picked.download_url}" target="_blank" rel="noopener">下載 ${picked.name}</a>`;
        return { id: source.id, name: picked.name, url: picked.download_url };
      } catch (err) {
        console.error(err);
        view.statusEl.textContent = '資料解析失敗，請稍後再試。';
        return null;
      }
    }

    async function load(){
      statusEl.textContent = '載入最新資料中…';
      downloadsEl.innerHTML = '';
      dataStates.clear();
      sections.forEach(view => closeFilterPopover(view));
      globalSearchTerm = globalSearchInput ? globalSearchInput.value.trim() : '';

      const results = await Promise.all(SOURCES.map(src => loadSource(src)));
      const available = results.filter(Boolean);

      if(available.length){
        const ul = document.createElement('ul');
        available.forEach(d => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = d.url;
          a.textContent = `${d.name}`;
          a.target = '_blank';
          li.appendChild(a);
          ul.appendChild(li);
        });
        downloadsEl.appendChild(ul);
      } else {
        downloadsEl.innerHTML = '<p>目前找不到可下載的檔案。</p>';
      }

      statusEl.textContent = '完成';
    }

    document.getElementById('refresh').addEventListener('click', () => { statusEl.textContent='重新載入…'; load(); });
    load();
  </script>
</body>
</html>
