name: Manual run - auto-option (testing)
permissions:
  contents: write

on:
  workflow_dispatch: {}

jobs:
  manual-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f testing/requirements.txt ]; then pip install -r testing/requirements.txt; fi

      - name: Ensure testing log folders exist
        run: |
          mkdir -p testing/logs testing/log

      - name: Run testing runner
        run: |
          python testing/auto-script.py

      - name: Upload artifacts (logs)
        uses: actions/upload-artifact@v4
        with:
          name: testing-logs
          path: |
            testing/log/**
            testing/logs/**
            testing/active/**
            testing/OI/**
            testing/stock_data.csv
            testing/final_stock_data.xlsx

      - name: Commit generated data to `data` branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          # create/update data branch and commit only if there are changes
          git fetch origin
          git checkout -B data
          echo "Listing testing directory before add:"
          ls -la testing || true
          ls -la testing/active || true
          ls -la testing/OI || true
          git status --porcelain || true
          git add testing/active testing/OI testing/stock_data.csv testing/final_stock_data.xlsx || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): update generated testing artifacts from workflow"
            git push origin data
          fi
