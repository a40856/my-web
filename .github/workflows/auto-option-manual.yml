name: Manual run - auto-option (testing)
permissions:
  contents: write

on:
  workflow_dispatch: {}

jobs:
  manual-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f testing/requirements.txt ]; then pip install -r testing/requirements.txt; fi

      - name: Ensure testing log folders exist
        run: |
          mkdir -p testing/logs testing/log

      - name: Run testing runner
        run: |
          python testing/auto-script.py

      - name: Upload artifacts (logs)
        uses: actions/upload-artifact@v4
        with:
          name: testing-logs
          path: |
            testing/log/**
            testing/logs/**
            testing/active/**
            testing/OI/**
            testing/stock_data.csv
            testing/final_stock_data.xlsx

      - name: Commit generated data to `data` branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git fetch origin
          echo "Listing testing directory before add:"
          ls -la testing || true
          ls -la testing/active || true
          ls -la testing/OI || true
          git status --porcelain || true

          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            echo "origin/data exists — using git worktree to avoid overwrite of untracked files"
            TMPWT=$(mktemp -d)
            echo "Creating worktree at $TMPWT"
            git worktree add "$TMPWT" origin/data
            # archive generated testing files into worktree with timestamped filenames
            TS=$(date -u +%Y-%m-%d_%H%M)
            mkdir -p "$TMPWT/testing/history" "$TMPWT/testing/active" "$TMPWT/testing/OI"
            if [ -f testing/stock_data.csv ]; then
              cp testing/stock_data.csv "$TMPWT/testing/history/stock_data-$TS.csv" || true
            fi
            if [ -f testing/final_stock_data.xlsx ]; then
              cp testing/final_stock_data.xlsx "$TMPWT/testing/history/final_stock_data-$TS.xlsx" || true
            fi
            for f in testing/active/*.xlsx; do
              [ -e "$f" ] || continue
              base=$(basename "$f" .xlsx)
              cp "$f" "$TMPWT/testing/active/${base}-$TS.xlsx" || true
            done
            for f in testing/OI/*.xlsx; do
              [ -e "$f" ] || continue
              base=$(basename "$f" .xlsx)
              cp "$f" "$TMPWT/testing/OI/${base}-$TS.xlsx" || true
            done
            pushd "$TMPWT"
            git add testing/history testing/active testing/OI || true
            if git diff --staged --quiet; then
              echo "No changes to commit in worktree"
            else
              git commit -m "chore(data): update generated testing artifacts from workflow"
              # create/update local branch 'data' pointing at current HEAD so we can push
              git checkout -B data
              git push origin data
            fi
            popd
            # remove worktree
            git worktree remove --force "$TMPWT" || true
            rm -rf "$TMPWT" || true
          else
            echo "origin/data does not exist — creating local data branch"
            TS=$(date -u +%Y-%m-%d_%H%M)
            mkdir -p testing/history testing/active testing/OI || true
            if [ -f testing/stock_data.csv ]; then
              cp testing/stock_data.csv testing/history/stock_data-$TS.csv || true
            fi
            if [ -f testing/final_stock_data.xlsx ]; then
              cp testing/final_stock_data.xlsx testing/history/final_stock_data-$TS.xlsx || true
            fi
            for f in testing/active/*.xlsx; do
              [ -e "$f" ] || continue
              base=$(basename "$f" .xlsx)
              cp "$f" "testing/active/${base}-$TS.xlsx" || true
            done
            for f in testing/OI/*.xlsx; do
              [ -e "$f" ] || continue
              base=$(basename "$f" .xlsx)
              cp "$f" "testing/OI/${base}-$TS.xlsx" || true
            done
            git checkout -B data
            git add testing/history testing/active testing/OI || true
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore(data): archive generated testing artifacts from workflow"
              git push origin data
            fi
          fi
