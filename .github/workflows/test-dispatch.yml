name: Test workflow dispatch

on:
  workflow_dispatch: {}

jobs:
  simple-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4

      - name: Create test artifact
        run: |
          mkdir -p testing
          echo "Test workflow run: $(date -u)" > testing/action-test.txt
          echo "Files in testing:" && ls -la testing

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: action-test-artifact
          path: testing/action-test.txt

      - name: Finish
        run: echo "Test workflow finished"
