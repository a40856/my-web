name: Daily auto-option

on:
  schedule:
    # 08:00 Hong Kong time = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

# Ensure the GITHUB_TOKEN has write permission for pushes
permissions:
  contents: write

jobs:
  run-auto-option:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the workflow token and keep credentials so later git push works
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify installations
        run: |
          python -c "import requests; import pandas; import openpyxl; print('All packages installed successfully')"

      - name: Run auto-option.py
        run: python auto-option.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto-update: Daily auto-option results $(date +'%Y-%m-%d %H:%M:%S')"
          # Explicitly push to main using the checked-out credentials
          git push origin HEAD:main
