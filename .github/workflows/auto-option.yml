name: Daily auto-option

on:
  schedule:
    # 08:00 Hong Kong time = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-auto-option:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify installations
        run: |
          python -c "import requests; import pandas; import openpyxl; print('All packages installed successfully')"

      - name: Run auto-option.py
        run: python auto-option.py
