name: auto-option-schedule

on:
  schedule:
    # 06:00 Asia/Hong_Kong => 22:00 UTC previous day; run daily at 22:00 UTC => 06:00 HKT daily
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-auto-option:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (if any)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ensure outputs dir exists (in testing)
        working-directory: testing
        run: mkdir -p outputs logs || true

      - name: Run auto-script.py (in testing)
        # Run the repo runner from testing/ directory
        working-directory: testing
        run: |
          set -o pipefail
          python auto-script.py 2>&1 | tee logs/auto-script-$(date +%F-%H%M%S).log

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-option-output-${{ github.run_id }}
          path: |
            testing/outputs/**
            testing/logs/**
          retention-days: 7
