name: auto-option-manual

on:
  workflow_dispatch:

jobs:
  run-auto-option:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (if any) (in testing)
        working-directory: testing
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ensure outputs/logs dirs exist (in testing)
        working-directory: testing
        run: mkdir -p outputs logs active OI || true

      - name: Run testing/auto-script.py
        working-directory: testing
        run: |
          set -o pipefail
          python auto-script.py 2>&1 | tee logs/auto-script-$(date +%F-%H%M%S).log

      - name: Upload testing artifacts (outputs + logs)
        uses: actions/upload-artifact@v4
        with:
          name: testing-artifacts-${{ github.run_id }}
          path: |
            testing/outputs/**
            testing/logs/**
            testing/active/**
            testing/OI/**
          retention-days: 7
