name: Scheduled auto-option (testing)

on:
  schedule:
    # Runs 06:00 HKT (UTC+8) Monday - Saturday -> 22:00 UTC Sunday - Friday
    - cron: '0 22 * * 0-5'
  workflow_dispatch: {}

jobs:
  run-testing-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f testing/requirements.txt ]; then pip install -r testing/requirements.txt; fi

      - name: Ensure testing folders exist
        run: |
          mkdir -p testing/logs testing/outputs testing/active testing/OI

      - name: Run testing runner
        run: |
          python testing/auto-script.py

      - name: Upload artifacts (outputs, logs, active, OI)
        uses: actions/upload-artifact@v4
        with:
          name: testing-artifacts
          path: |
            testing/outputs/**
            testing/logs/**
            testing/active/**
            testing/OI/**
